<!DOCTYPE html>
<html>
<head>
    <title>TruthTrace - Secure Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>TruthTrace</h2>
            <div>
                <span>{{ current_user.username }}</span>
                <a href="{{ url_for('logout') }}" style="color: #ef4444; margin-left: 15px;">Logout</a>
            </div>
        </div>
        <p>Evidence Analysis System</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-box">
                <input type="file" name="file" required>
            </div>
            <button type="submit">Analyze Evidence</button>
        </form>
        <p style="margin-top: 15px;">
            <a href="{{ url_for('dashboard') }}" style="color: #38bdf8;">View Dashboard</a>
        </p>
    </div>
</body>
</html>
